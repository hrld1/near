name: CI y despliegue

# Cada push a main: verificar (lint + tipos + tests) → construir la imagen y
# publicarla en GHCR → redesplegar en Northflank (solo si hay credenciales
# configuradas; sin ellas, el workflow termina en la imagen y no falla).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  imagen:
    needs: verificar
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  desplegar:
    needs: imagen
    runs-on: ubuntu-latest
    steps:
      # El secreto no se puede consultar en un `if:` de job, así que se mira
      # aquí: sin credenciales el deploy se salta en vez de fallar (la imagen
      # ya está publicada y redesplegar es un clic en Northflank).
      - name: ¿Hay credenciales?
        id: cfg
        env:
          NORTHFLANK_API_KEY: ${{ secrets.NORTHFLANK_API_KEY }}
          NORTHFLANK_PROJECT: ${{ vars.NORTHFLANK_PROJECT }}
          NORTHFLANK_SERVICE: ${{ vars.NORTHFLANK_SERVICE }}
        run: |
          if [ -z "$NORTHFLANK_API_KEY" ] || [ -z "$NORTHFLANK_PROJECT" ] || [ -z "$NORTHFLANK_SERVICE" ]; then
            echo "Sin credenciales de Northflank: la imagen queda publicada y el deploy se omite."
            echo "listo=false" >> "$GITHUB_OUTPUT"
          else
            echo "listo=true" >> "$GITHUB_OUTPUT"
          fi

      # La imagen de GHCR es pública, así que no hace falta `credentials-id`.
      - name: Redesplegar en Northflank
        if: steps.cfg.outputs.listo == 'true'
        uses: northflank/deploy-to-northflank@v1
        with:
          northflank-api-key: ${{ secrets.NORTHFLANK_API_KEY }}
          project-id: ${{ vars.NORTHFLANK_PROJECT }}
          service-id: ${{ vars.NORTHFLANK_SERVICE }}
          image-path: ghcr.io/${{ github.repository }}:${{ github.sha }}
