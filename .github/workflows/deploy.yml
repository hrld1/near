name: CI y despliegue

# Cada push a main: verificar (lint + tipos + tests) → construir la imagen y
# publicarla en GHCR → redesplegar en Koyeb (solo si hay token configurado;
# sin él, el workflow termina en la imagen y no falla).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  imagen:
    needs: verificar
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  desplegar:
    needs: imagen
    runs-on: ubuntu-latest
    env:
      KOYEB_API_TOKEN: ${{ secrets.KOYEB_API_TOKEN }}
      # formato app/servicio, p. ej. "near/web" — configúralo como variable
      # del repositorio (Settings → Secrets and variables → Actions → Variables)
      KOYEB_SERVICE: ${{ vars.KOYEB_SERVICE }}
    steps:
      - name: Redesplegar en Koyeb
        run: |
          if [ -z "$KOYEB_API_TOKEN" ] || [ -z "$KOYEB_SERVICE" ]; then
            echo "Sin KOYEB_API_TOKEN o KOYEB_SERVICE: la imagen queda publicada y el deploy se omite."
            exit 0
          fi
          curl -fsSL https://raw.githubusercontent.com/koyeb/koyeb-cli/master/install.sh | sh
          export PATH=$HOME/.koyeb/bin:$PATH
          koyeb service update "$KOYEB_SERVICE" \
            --docker "ghcr.io/${{ github.repository }}:${{ github.sha }}" \
            --token "$KOYEB_API_TOKEN"
