name: Backup de la base de datos

# Copia semanal cifrada de Postgres a R2. Neon free guarda poco historial de
# recuperación; este es NUESTRO seguro. Se cifra en el runner con una
# passphrase (BACKUP_PASSPHRASE) antes de salir a R2, así el bucket nunca ve
# datos en claro. Restaurar: descargar, `gpg -d`, `pg_restore`.
on:
  schedule:
    - cron: "17 3 * * 1" # lunes 03:17 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Comprobar secretos
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$BACKUP_PASSPHRASE" ] || [ -z "$S3_BUCKET" ]; then
            echo "Faltan secretos (DATABASE_URL / BACKUP_PASSPHRASE / S3_BUCKET). Configúralos para activar el backup."
            exit 1
          fi

      # pg_dump puede volcar su versión y anteriores, pero NO un servidor más
      # nuevo que él. Neon corre 18, así que hace falta el cliente 18.
      # La AWS CLI v2 ya viene en el runner (y `awscli` dejó de existir en apt
      # a partir de Ubuntu 24.04, que es lo que rompía antes).
      - name: Instalar pg_dump 18 (compatible con Neon)
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-18
          # El runner trae su propio pg_dump 16 en /usr/bin que tapa al de
          # pgdg: instalar no basta, hay que anteponerlo en el PATH. Se coge
          # la versión más alta instalada para que esto siga valiendo cuando
          # Neon suba de versión otra vez.
          ls -d /usr/lib/postgresql/*/bin | sort -V | tail -1 >> "$GITHUB_PATH"

      # En un paso aparte: GITHUB_PATH solo aplica a los pasos siguientes, así
      # que aquí ya se ve el pg_dump que de verdad va a correr el volcado.
      - name: Comprobar versiones
        run: |
          pg_dump --version
          aws --version

      - name: Volcar, cifrar y subir a R2
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
        run: |
          set -euo pipefail
          STAMP=$(date -u +%Y-%m-%d)
          FILE="near-${STAMP}.dump.gpg"
          # formato custom (-Fc): comprimido y restaurable con pg_restore
          pg_dump "$DATABASE_URL" -Fc \
            | gpg --batch --yes --symmetric --cipher-algo AES256 \
                  --passphrase "$BACKUP_PASSPHRASE" -o "$FILE"
          aws s3 cp "$FILE" "s3://${S3_BUCKET}/backups/${FILE}" \
            --endpoint-url "$S3_ENDPOINT"
          echo "Backup subido: backups/${FILE} ($(du -h "$FILE" | cut -f1))"

      - name: Podar backups con más de 60 días
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
        run: |
          set -euo pipefail
          CUTOFF=$(date -u -d '60 days ago' +%Y-%m-%d)
          aws s3 ls "s3://${S3_BUCKET}/backups/" --endpoint-url "$S3_ENDPOINT" \
            | awk '{print $4}' | grep -E '^near-[0-9]{4}-[0-9]{2}-[0-9]{2}\.dump\.gpg$' \
            | while read -r key; do
                d=$(echo "$key" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
                if [ "$d" \< "$CUTOFF" ]; then
                  aws s3 rm "s3://${S3_BUCKET}/backups/${key}" --endpoint-url "$S3_ENDPOINT"
                  echo "Podado: ${key}"
                fi
              done
