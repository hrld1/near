name: Backup de la base de datos

# Copia semanal cifrada de Postgres a R2. Neon free guarda poco historial de
# recuperación; este es NUESTRO seguro. Se cifra en el runner con una
# passphrase (BACKUP_PASSPHRASE) antes de salir a R2, así el bucket nunca ve
# datos en claro. Restaurar: descargar, `gpg -d`, `pg_restore`.
on:
  schedule:
    - cron: "17 3 * * 1" # lunes 03:17 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Comprobar secretos
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$BACKUP_PASSPHRASE" ] || [ -z "$S3_BUCKET" ]; then
            echo "Faltan secretos (DATABASE_URL / BACKUP_PASSPHRASE / S3_BUCKET). Configúralos para activar el backup."
            exit 1
          fi

      # pg_dump puede volcar su versión y anteriores, pero NO un servidor más
      # nuevo que él, y Neon corre 18. Instalarlo por apt no funciona: el
      # runner ya trae postgresql-client-16 de pgdg y su wrapper en /usr/bin
      # gana al binario nuevo, así que el volcado seguía saliendo en 16.14.
      # Con la imagen oficial la versión queda fijada y no depende de lo que
      # el runner tenga instalado. La AWS CLI v2 ya viene preinstalada.
      - name: Comprobar versiones
        run: |
          docker run --rm "$PG_IMAGE" pg_dump --version
          aws --version
        env:
          PG_IMAGE: postgres:18-alpine

      - name: Volcar, cifrar y subir a R2
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          PG_IMAGE: postgres:18-alpine
        run: |
          set -euo pipefail
          STAMP=$(date -u +%Y-%m-%d)
          FILE="near-${STAMP}.dump.gpg"
          # La URL entra al contenedor como variable, no como argumento, para
          # que no quede en la línea de comandos. Formato custom (-Fc):
          # comprimido y restaurable con pg_restore.
          docker run --rm -e PGURL="$DATABASE_URL" "$PG_IMAGE" \
              sh -c 'pg_dump "$PGURL" -Fc' \
            | gpg --batch --yes --symmetric --cipher-algo AES256 \
                  --passphrase "$BACKUP_PASSPHRASE" -o "$FILE"
          # Un backup vacío que "termina bien" es peor que uno que falla: se
          # descubriría el día que haga falta restaurar.
          SIZE=$(stat -c%s "$FILE")
          if [ "$SIZE" -lt 1024 ]; then
            echo "El volcado ocupa $SIZE bytes: algo ha ido mal."
            exit 1
          fi
          aws s3 cp "$FILE" "s3://${S3_BUCKET}/backups/${FILE}" \
            --endpoint-url "$S3_ENDPOINT"
          echo "Backup subido: backups/${FILE} ($(du -h "$FILE" | cut -f1))"

      - name: Podar backups con más de 60 días
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
        run: |
          set -euo pipefail
          CUTOFF=$(date -u -d '60 days ago' +%Y-%m-%d)
          aws s3 ls "s3://${S3_BUCKET}/backups/" --endpoint-url "$S3_ENDPOINT" \
            | awk '{print $4}' | grep -E '^near-[0-9]{4}-[0-9]{2}-[0-9]{2}\.dump\.gpg$' \
            | while read -r key; do
                d=$(echo "$key" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
                if [ "$d" \< "$CUTOFF" ]; then
                  aws s3 rm "s3://${S3_BUCKET}/backups/${key}" --endpoint-url "$S3_ENDPOINT"
                  echo "Podado: ${key}"
                fi
              done
